<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x2cory</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:black;
  color:white;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

#vanta-bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}

.card{
  position:relative;
  z-index:2;
  width:320px;
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.5);
  box-shadow:0 0 30px rgba(180,0,255,0.2);
  text-align:left;
}

.header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:15px;
}

.avatar{
  width:55px;
  height:55px;
  border-radius:50%;
  object-fit:cover;
  object-position:center;
  border:2px solid #b400ff;
  box-shadow:0 0 10px #b400ff,0 0 20px #b400ff;
}

h1{
  font-size:1.8rem;
}

.bio{
  font-size:0.9rem;
  opacity:0.7;
  margin-bottom:15px;
}

.section-title{
  font-size:0.7rem;
  letter-spacing:2px;
  opacity:0.5;
  margin-top:15px;
  margin-bottom:5px;
}

.links a{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  color:white;
  padding:6px 0;
  transition:0.2s;
}

.links a:hover{
  transform:translateX(5px);
  text-shadow:0 0 8px #b400ff;
}

.icon{
  width:16px;
  height:16px;
  fill:white;
  stroke:#b400ff;
  filter:drop-shadow(0 0 5px #b400ff);
}

.cursor{
  position:fixed;
  width:10px;
  height:10px;
  background:#b400ff;
  border-radius:50%;
  pointer-events:none;
  box-shadow:0 0 10px #b400ff;
  z-index:9999;
}

.trail{
  position:fixed;
  width:6px;
  height:6px;
  background:#b400ff;
  border-radius:50%;
  opacity:0.6;
  pointer-events:none;
  animation:fade 0.5s forwards;
}

@keyframes fade{
  to{opacity:0;transform:scale(0.5)}
}
</style>
</head>

<body>
<div id="vanta-bg"></div>

<div class="card">
  <div class="header">
    <img src="Roxas.jfif.jfif" class="avatar">
    <h1>x2cory</h1>
  </div>

  <div class="bio">just another presence on the internet</div>
  <div style="margin-bottom:10px; font-size:0.8rem; opacity:0.6;">
    https://x2cory/me/
  </div>

  <div class="section-title">LINKS</div>
  <div class="links">
    <a href="https://www.roblox.com/users/2631435111/profile">
      <svg class="icon" viewBox="0 0 24 24"><path d="M3 3h18v18H3zM9 9h6v6H9z"/></svg>
      roblox
    </a>

    <a href="https://steamcommunity.com/profiles/76561198762654441/">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12 0a12 12 0 100 24 12 12 0 000-24z"/></svg>
      steam
    </a>

    <a href="https://www.tiktok.com/@x2cory">
      <svg class="icon" viewBox="0 0 24 24"><path d="M16 2a6 6 0 004 2v3"/></svg>
      tiktok
    </a>

    <a href="https://discord.gg/ydMA2d72at">
      <svg class="icon" viewBox="0 0 24 24"><path d="M20 4a16 16 0 00-4-1"/></svg>
      discord
    </a>
  </div>
</div>

<div class="cursor" id="cursor"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>

<script>
VANTA.BIRDS({
  el:"#vanta-bg",
  mouseControls:true,
  touchControls:true,
  backgroundColor:0x000000,
  color1:0x6b2591,
  color2:0xdcc7c7
});

const cursor=document.getElementById('cursor');

document.addEventListener('mousemove',(e)=>{
  const x=e.clientX;
  const y=e.clientY;

  cursor.style.transform=`translate(${x}px,${y}px)`;

  const t=document.createElement('div');
  t.className='trail';
  t.style.left=x+'px';
  t.style.top=y+'px';

  document.body.appendChild(t);
  setTimeout(()=>t.remove(),500);
});
</script>

</body>
</html>
